version: "3.9"

services:
  mysql:
    image: mysql:8
    container_name: gadgethub-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gadgethub
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - gadgethub-network

  backend:
    build: ./server
    container_name: gadgethub-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: gadgethub
      JWT_SECRET: gadgethub_super_secret_key_2024
    networks:
      - gadgethub-network

  frontend:
    build: ./src
    container_name: gadgethub-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - gadgethub-network

  nginx:
    image: nginx:alpine
    container_name: gadgethub-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - gadgethub-network

volumes:
  mysql_data:

networks:
  gadgethub-network: